<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UDL 영양교육 인트로 스토리</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #F3F6F4;
      font-family: 'Pretendard', sans-serif;
    }

    #story-stage {
      position: relative;
      width: 100vw;
      height: 56.25vw;
      max-height: 100vh;
      max-width: 177.78vh;
      margin: auto;
      top: 50%;
      transform: translateY(-50%);
      background-color: #F3F6F4;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      /* 배경 이미지는 원본 그대로 (채도·명암 보정/크로스페이드 없음) */
      overflow: hidden;
      container-type: size;
      container-name: stage;
    }

    .flash-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 99;
    }
    .flash-active {
      animation: flash-anim 0.8s ease-out;
    }
    @keyframes flash-anim {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* 캐릭터 슬롯 (그림자 + 이미지) */
    .char-slot {
      position: absolute;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition:
        transform 1.2s ease,
        opacity 0.7s ease,
        bottom 1.2s ease,
        width 1s ease,
        height 1s ease;
      z-index: 5;
      transform-origin: bottom center;
    }
    .char-slot.visible {
      opacity: 1;
    }

    /* 나란히 서 있는 기본(뒤) 위치 */
    .char-slot.child {
      bottom: 10%;
      width: 16%;
      height: 42%;
      z-index: 5;
      transition:
        transform 0.55s ease,
        opacity 0.7s ease,
        bottom 0.55s ease,
        width 0.55s ease,
        height 0.55s ease;
    }

    /* 뚱뚱유아·장난감유아: 동일 높이 */
    #slot-child-fat,
    #slot-child-toy {
      height: 42%;
      width: 16%;
      overflow: visible;
    }
    #slot-child-fat .character,
    #slot-child-toy .character {
      height: 100%;
      width: auto;
      max-width: none;
      object-fit: contain;
      object-position: bottom center;
      transform-origin: bottom center;
    }
    /* 장난감유아·1·2: 살짝 크게 (놀란 이미지도 동일 슬롯) */
    #slot-child-toy .character {
      height: 106%;
    }
    #slot-child-sick .character {
      height: 100%;
      width: auto;
      max-width: none;
      object-fit: contain;
      object-position: bottom center;
    }

    /* 대사 중: 제자리 유지 (미끄러지듯 앞/뒤 이동 없음) */
    .char-slot.speaking {
      z-index: 20;
    }

    /* 뚱뚱유아·장난감유아 말할 때: 발 고정, 몸만 부드럽게 살짝 흔들림 */
    #slot-child-fat.speaking .character,
    #slot-child-toy.speaking .character {
      transform-origin: bottom center;
      animation: talk-sway 1.45s ease-in-out infinite;
    }
    @keyframes talk-sway {
      0%, 100% {
        transform: rotate(0deg) translateY(0);
      }
      35% {
        transform: rotate(-1.1deg) translateY(-1.2%);
      }
      70% {
        transform: rotate(0.9deg) translateY(-0.4%);
      }
    }

    .foot-shadow {
      position: absolute;
      bottom: 1%;
      left: 28%;
      width: 58%;
      height: 10%;
      background: radial-gradient(
        ellipse at center,
        rgba(0, 0, 0, 0.42) 0%,
        rgba(0, 0, 0, 0.18) 45%,
        transparent 72%
      );
      transform: translateX(-18%) skewX(-28deg);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    /* 배아픈유아 그림자 조금 더 크게 */
    #slot-child-sick .foot-shadow {
      width: 78%;
      height: 15%;
      bottom: 0;
      left: 22%;
      opacity: 0.95;
    }

    .character {
      position: relative;
      z-index: 1;
      height: 100%;
      width: 100%;
      object-fit: contain;
      object-position: bottom center;
      display: block;
    }

    /* 유아 나란히 (사이 공간에 히어로 등장) */
    #slot-child-fat  { left: 4%; }
    #slot-child-toy  { left: 36%; }
    #slot-child-sick { left: 68%; }

    /* 히어로: 유아와 같은 라인에 등장, 사이사이 배치 */
    .char-slot.hero {
      bottom: 10%;
      width: 15%;
      height: 44%;
      z-index: 12;
      transition:
        transform 0.28s cubic-bezier(0.2, 0.9, 0.3, 1),
        opacity 0.7s ease,
        bottom 0.28s cubic-bezier(0.2, 0.9, 0.3, 1);
    }
    #slot-hero-healthy { left: 20%; }
    #slot-hero-eti     { left: 53%; width: 13%; height: 39%; }
    #slot-hero-safey   { left: 82%; width: 17%; height: 48%; }

    /* 점프하며 살짝만 나오기 */
    .char-slot.hero.step-forward {
      bottom: 9.2%;
      transform: translateY(1%) scale(1.015);
      z-index: 22;
    }

    /* 한 번 작게 점프하며 나오기/들어가기 */
    .char-slot.hero.walking .character {
      transform-origin: bottom center;
      animation: walk-bounce 0.48s ease-in-out 1;
    }
    @keyframes walk-bounce {
      0% { transform: translateY(0) scale(1, 1); }
      35% { transform: translateY(-8%) scale(0.98, 1.04); }
      70% { transform: translateY(0) scale(1.02, 0.97); }
      100% { transform: translateY(0) scale(1, 1); }
    }

    /* 히어로 등장 별가루 — 캐릭터 앞에 덮어 두고, 뒤에서 줌아웃 */
    .sparkle-burst {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 20;
      overflow: visible;
      transition: opacity 0.85s ease-out;
    }
    .sparkle-burst.fading {
      opacity: 0;
    }
    .sparkle-silhouette {
      position: absolute;
      left: 10%;
      top: 2%;
      width: 80%;
      height: 94%;
      border-radius: 48% 48% 42% 42%;
      background: radial-gradient(
        ellipse at 50% 42%,
        rgba(255, 245, 170, 0.7) 0%,
        rgba(255, 215, 100, 0.38) 36%,
        rgba(255, 190, 70, 0.12) 58%,
        transparent 76%
      );
      filter: blur(2.5px);
      animation: silhouette-pulse 1.1s ease-in-out infinite;
    }
    @keyframes silhouette-pulse {
      0%, 100% { opacity: 0.65; transform: scale(0.97); }
      50% { opacity: 1; transform: scale(1.05); }
    }
    .sparkle {
      position: absolute;
      left: var(--x, 50%);
      top: var(--y, 50%);
      width: var(--size, 7px);
      height: var(--size, 7px);
      margin-left: calc(var(--size, 7px) / -2);
      margin-top: calc(var(--size, 7px) / -2);
      background: #FFE566;
      box-shadow:
        0 0 4px rgba(255, 255, 255, 0.95),
        0 0 10px rgba(255, 209, 92, 0.9),
        0 0 16px rgba(255, 180, 60, 0.55);
      clip-path: polygon(
        50% 0%, 63% 38%, 100% 38%, 69% 59%,
        82% 100%, 50% 75%, 18% 100%, 31% 59%,
        0% 38%, 37% 38%
      );
      opacity: 0;
      animation: sparkle-twinkle 0.95s ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }
    .sparkle.dot {
      clip-path: none;
      border-radius: 50%;
      background: #FFF8D6;
    }
    @keyframes sparkle-twinkle {
      0%, 100% {
        opacity: 0.15;
        transform: scale(0.45) rotate(0deg);
      }
      45% {
        opacity: 1;
        transform: scale(1.3) rotate(25deg);
      }
      70% {
        opacity: 0.6;
        transform: scale(0.85) rotate(10deg);
      }
    }

    .char-slot.hero .character {
      z-index: 2;
    }
    .char-slot.hero .foot-shadow {
      z-index: 1;
    }

    /* 별가루만 먼저: 캐릭터·그림자 숨김 */
    .char-slot.hero.pre-appear .character,
    .char-slot.hero.pre-appear .foot-shadow {
      opacity: 0;
    }

    /* 제자리에서 커지며 등장 */
    .char-slot.hero.appearing .character {
      animation: hero-grow-in 1.05s cubic-bezier(0.22, 0.61, 0.36, 1) both;
      transform-origin: bottom center;
    }
    .char-slot.hero.appearing .foot-shadow {
      animation: hero-shadow-in 1.05s ease-out both;
    }
    @keyframes hero-grow-in {
      0% {
        opacity: 0;
        filter: brightness(1.7);
        transform: scale(0.35);
      }
      55% {
        opacity: 1;
        filter: brightness(1.25);
        transform: scale(1.06);
      }
      100% {
        opacity: 1;
        filter: brightness(1);
        transform: scale(1);
      }
    }
    @keyframes hero-shadow-in {
      0% { opacity: 0; transform: translateX(-18%) skewX(-28deg) scale(0.35); }
      55% { opacity: 1; transform: translateX(-18%) skewX(-28deg) scale(1.05); }
      100% { opacity: 1; transform: translateX(-18%) skewX(-28deg) scale(1); }
    }

    /* 미션 활동 오버레이 */
    #mission-overlay {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0);
      transition: background 0.7s ease;
      pointer-events: none;
    }
    #mission-overlay.active {
      display: flex;
      opacity: 1;
    }
    #mission-overlay.active.dimmed {
      background: rgba(0, 0, 0, 0.28);
    }
    #mission-card {
      width: 94%;
      max-width: none;
      max-height: 94%;
      border-radius: 14px;
      overflow: hidden;
      box-shadow:
        0 12px 40px rgba(0, 0, 0, 0.45),
        0 0 0 4px rgba(255, 255, 255, 0.55);
      opacity: 0;
      transform: scale(0.92) translateY(12px);
      transition: opacity 0.55s ease, transform 0.55s ease;
      background: #fff;
    }
    #mission-card.show {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
    #mission-card img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 92cqh;
      object-fit: contain;
      background: #fff;
    }

    /* 미션7: 아주 작은 크기 → 화면 전체 (서서히) */
    #mission-overlay.expanding {
      background: rgba(0, 0, 0, 0);
      transition: background 0.6s ease, opacity 1.7s ease;
    }
    #mission-overlay.fade-to-ending {
      opacity: 0;
      pointer-events: none;
    }
    #mission-card.grow-from-tiny {
      width: 6%;
      max-width: none;
      height: 6%;
      max-height: none;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      opacity: 1;
      transform: none;
      transition: none;
    }
    #mission-card.expand-fill {
      width: 100%;
      max-width: none;
      height: 100%;
      max-height: none;
      border-radius: 0;
      box-shadow: none;
      transform: none;
      opacity: 1;
      transition:
        width 2.7s cubic-bezier(0.22, 0.61, 0.36, 1),
        height 2.7s cubic-bezier(0.22, 0.61, 0.36, 1),
        border-radius 2.7s ease;
    }
    #mission-card.expand-fill img,
    #mission-card.grow-from-tiny img {
      width: 100%;
      height: 100%;
      max-height: none;
      object-fit: cover;
    }
    #mission-card.expand-fill img {
      transition: filter 1.4s ease, opacity 1.4s ease;
    }
    #whiteout {
      position: absolute;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      background: transparent;
      visibility: hidden;
    }

    /* 알록달록 종이 가루 */
    #confetti {
      position: absolute;
      inset: 0;
      z-index: 80;
      pointer-events: none;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      top: -8%;
      left: 50%;
      width: 16px;
      height: 20px;
      background: #FF6B6B;
      opacity: 1;
      border-radius: 2px;
      animation-name: confetti-fall;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
    }
    .confetti-piece.round {
      border-radius: 50%;
    }
    @keyframes confetti-fall {
      0% {
        transform: translate3d(0, 0, 0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translate3d(var(--drift, 30px), var(--fall, 900px), 0) rotate(var(--spin, 720deg));
        opacity: 0.85;
      }
    }

    /* 엔딩 눈깜빡: 같은 슬롯에 겹치되, 한 장만 보이게 */
    .char-stack {
      position: relative;
      height: 100%;
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      transform-origin: bottom center;
    }
    .char-slot.ending-blink .character,
    .char-slot.ending-blink .character-blink {
      position: absolute;
      left: 50%;
      bottom: 0;
      height: 100%;
      width: auto;
      max-width: none;
      object-fit: contain;
      object-position: bottom center;
      transform: translateX(-50%);
      transform-origin: bottom center;
    }
    #slot-child-toy.ending-blink .character,
    #slot-child-toy.ending-blink .character-blink {
      height: 106%;
    }
    .char-slot.ending-blink .character-blink {
      visibility: hidden;
      z-index: 2;
      pointer-events: none;
    }
    .char-slot.ending-blink.is-blinking .character {
      visibility: hidden;
    }
    .char-slot.ending-blink.is-blinking .character-blink {
      visibility: visible;
    }
    .char-slot.ending-blink .character {
      z-index: 1;
      visibility: visible;
    }

    /* 엔딩 바운스: 히어로만 */
    .char-slot.ending-bounce .character {
      transform-origin: bottom center;
      animation: ending-bounce 1.15s ease-in-out infinite;
    }
    #slot-hero-healthy.ending-bounce .character { animation-delay: 0.05s; }
    #slot-hero-eti.ending-bounce .character { animation-delay: 0.18s; }
    #slot-hero-safey.ending-bounce .character { animation-delay: 0.08s; }
    @keyframes ending-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* 상장 받은 유아: 눈깜빡임과 겹쳐도 자연스럽게 몸만 살짝 들썩 */
    .char-slot.child.award-happy .char-stack {
      transform-origin: bottom center;
      animation: kid-award-happy 1.15s ease-in-out infinite;
    }
    .char-slot.child.award-happy > .character {
      transform-origin: bottom center;
      animation: kid-award-happy 1.15s ease-in-out infinite;
    }
    .char-slot.child.award-happy .char-stack > .character,
    .char-slot.child.award-happy .char-stack > .character-blink {
      /* 스택이 움직일 때 개별 캐릭터 애니 없음 (깜빡임 유지) */
      animation: none;
    }
    /* 배아픈유아(휠체어): 상하 바운스 없이 앞뒤로만 아주 살짝 */
    #slot-child-sick.award-happy .char-stack,
    #slot-child-sick.award-happy > .character {
      transform-origin: bottom center;
      animation: kid-award-wheelchair 1.4s ease-in-out infinite;
    }
    #slot-child-fat.award-happy .char-stack { animation-delay: 0s; }
    #slot-child-toy.award-happy .char-stack { animation-delay: 0.14s; }
    #slot-child-sick.award-happy .char-stack { animation-delay: 0.08s; }
    @keyframes kid-award-happy {
      0%, 100% {
        transform: translateY(0) scale(1, 1);
      }
      50% {
        transform: translateY(-1.6%) scale(1.01, 0.99);
      }
    }
    @keyframes kid-award-wheelchair {
      0%, 100% {
        transform: translateX(0) rotate(0deg);
      }
      50% {
        transform: translateX(1.1%) rotate(0.35deg);
      }
    }

    /* 튼튼 영양대장 상장 — 유아 머리 위 (입체 카드) */
    .char-slot.child {
      overflow: visible;
      perspective: 520px;
      perspective-origin: 50% 35%;
    }
    .nutrition-award-wrap {
      --award-gap: 1.4vmin;
      --char-h: 100%;
      position: absolute;
      left: 50%;
      bottom: calc(var(--char-h) + var(--award-gap));
      width: clamp(76px, 14vmin, 124px);
      z-index: 28;
      pointer-events: none;
      transform: translateX(-50%);
      transform-style: preserve-3d;
    }
    #slot-child-fat .nutrition-award-wrap {
      --char-h: 100%;
    }
    #slot-child-toy .nutrition-award-wrap {
      --char-h: 106%;
    }
    #slot-child-sick .nutrition-award-wrap {
      --char-h: 100%;
    }
    .nutrition-award {
      position: relative;
      width: 100%;
      opacity: 0;
      transform-origin: center bottom;
      transform-style: preserve-3d;
      transform: translateY(18%) rotateX(28deg) scale(0.78);
    }
    .nutrition-award.show {
      animation: award-appear-3d 1.25s cubic-bezier(0.22, 0.82, 0.28, 1) forwards;
    }
    .nutrition-award.settled {
      opacity: 1;
      animation: award-idle-3d 2.8s ease-in-out infinite;
    }
    @keyframes award-appear-3d {
      0% {
        opacity: 0;
        transform: translateY(24%) rotateX(38deg) scale(0.72);
      }
      58% {
        opacity: 1;
        transform: translateY(-3%) rotateX(10deg) scale(1.03);
      }
      100% {
        opacity: 1;
        transform: translateY(0) rotateX(14deg) scale(1);
      }
    }
    @keyframes award-idle-3d {
      0%, 100% {
        transform: translateY(0) rotateX(14deg) scale(1);
      }
      50% {
        transform: translateY(-2px) rotateX(12deg) scale(1.01);
      }
    }
    .nutrition-award img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      border-radius: 5px;
      background: #fff;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.95),
        0 8px 18px rgba(40, 30, 15, 0.28),
        0 2px 4px rgba(40, 30, 15, 0.18),
        0 18px 28px -8px rgba(30, 20, 10, 0.35);
      transform: translateZ(12px);
      backface-visibility: hidden;
    }
    /* 앞면 하이라이트 — 종이 질감/빛 반사 */
    .nutrition-award::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 5px;
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.55) 0%,
        rgba(255, 255, 255, 0.12) 28%,
        transparent 48%,
        rgba(40, 30, 10, 0.06) 100%
      );
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
      pointer-events: none;
      transform: translateZ(14px);
    }
    /* 바닥에 떨어지는 그림자 — 떠 있는 입체감 */
    .nutrition-award::before {
      content: '';
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: -10%;
      height: 18%;
      border-radius: 50%;
      background: radial-gradient(
        ellipse at center,
        rgba(40, 30, 15, 0.38) 0%,
        rgba(40, 30, 15, 0.12) 55%,
        transparent 75%
      );
      filter: blur(2px);
      transform: rotateX(80deg) translateZ(-8px) scale(1, 0.55);
      z-index: -1;
    }
    .award-sparkle-burst {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 160%;
      height: 140%;
      transform: translate(-50%, 8%);
      pointer-events: none;
      z-index: 3;
      overflow: visible;
    }
    .award-sparkle {
      position: absolute;
      left: var(--x, 50%);
      top: var(--y, 50%);
      width: var(--size, 10px);
      height: var(--size, 10px);
      margin-left: calc(var(--size, 10px) / -2);
      margin-top: calc(var(--size, 10px) / -2);
      background: #FFE566;
      box-shadow:
        0 0 4px rgba(255, 255, 255, 1),
        0 0 12px rgba(255, 220, 90, 0.95),
        0 0 20px rgba(255, 200, 60, 0.65);
      clip-path: polygon(
        50% 0%, 63% 38%, 100% 38%, 69% 59%,
        82% 100%, 50% 75%, 18% 100%, 31% 59%,
        0% 38%, 37% 38%
      );
      opacity: 0;
      animation: award-sparkle-pop 1.15s ease-out forwards;
      animation-delay: var(--delay, 0s);
    }
    .award-sparkle.dot {
      clip-path: none;
      border-radius: 50%;
      background: #fffef0;
    }
    .award-sparkle-burst::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 42%;
      width: 70%;
      height: 70%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(255, 248, 180, 0.75) 0%,
        rgba(255, 220, 100, 0.28) 42%,

  // 앱인벤터/태블릿: HTML Audio는 첫 터치 이후 재생이 막히므로 Web Audio로 통일
  const ALL_STORY_AUDIO = [
    "sound/audio_뚱뚱유아_대사1.mp3",
    "sound/audio_장난감유아_대사1.mp3",
    "sound/audio_배아픈유아_대사1.mp3",
    "sound/audio_헬씨_대사1.mp3",
    "sound/audio_에티_대사1.mp3",
    "sound/audio_세이피_대사1.mp3",
    "sound/audio_헬씨_대사2.mp3",
    "sound/audio_에티_대사2.mp3",
    "sound/audio_세이피_대사2.mp3",
    "sound/audio_헬씨_대사3.mp3",
    "sound/audio_에티_대사3.mp3",
    "sound/audio_세이피_대사3.mp3",
    "sound/Ascending 3.mp3",
    "sound/영양미션완성.mp3",
    "sound/sfx/applause.mp3",
    "sound/sfx/mission_pop.ogg"
  ];
  let audioCtx = null;
  const audioBufferCache = new Map();
  let activeBufferSources = [];
  let loopingSources = [];

  function getAudioCtx() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
    }
    return audioCtx;
  }

  function unlockAudioContext() {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') {
      return ctx.resume().catch(() => {});
    }
    return Promise.resolve();
  }

  function preloadAudioBuffers(list) {
    const srcs = list || ALL_STORY_AUDIO;
    return Promise.all(srcs.map(src =>
      loadAudioBuffer(src).catch(err => {
        console.warn('Audio buffer preload failed:', src, err);
        return null;
      })
    ));
  }

  function loadAudioBuffer(src) {
    if (audioBufferCache.has(src)) {
      return Promise.resolve(audioBufferCache.get(src));
    }
    const ctx = getAudioCtx();
    return fetch(encodeURI(src))
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.arrayBuffer();
      })
      .then(buf => ctx.decodeAudioData(buf.slice(0)))
      .then(decoded => {
        audioBufferCache.set(src, decoded);
        return decoded;
      });
  }

  function stopBufferSources(list) {
    (list || []).forEach(src => {
      try { src.stop(); } catch (e) {}
    });
  }

  /** Web Audio 단건 재생 (태블릿에서도 연속 재생 가능) */
  function playBuffer(src, onDone, opts) {
    const volume = opts && opts.volume != null ? opts.volume : 1;
    const loop = !!(opts && opts.loop);
    return unlockAudioContext()
      .then(() => loadAudioBuffer(src))
      .then(buffer => {
        const ctx = getAudioCtx();
        if (!(opts && opts.overlap)) {
          stopBufferSources(activeBufferSources);
          activeBufferSources = [];
        }
        const source = ctx.createBufferSource();
        const gain = ctx.createGain();
        gain.gain.value = volume;
        source.buffer = buffer;
        source.loop = loop;
        source.connect(gain);
        gain.connect(ctx.destination);

        let finished = false;
        const done = () => {
          if (finished) return;
          finished = true;
          if (typeof onDone === 'function') onDone();
        };

        source.onended = () => {
          if (!loop) done();
        };
        source.start();
        if (loop) {
          loopingSources.push({ source, gain });
        } else {
          activeBufferSources.push(source);
          setTimeout(done, Math.ceil((buffer.duration || 1) * 1000) + 250);
        }
        return { source, gain };
      })
      .catch(err => {
        console.warn('playBuffer failed:', src, err);
        if (typeof onDone === 'function') {
          setTimeout(onDone, 1200);
        }
        return null;
      });
  }

  function stopLoopingAudio() {
    loopingSources.forEach(item => {
      const src = item && item.source ? item.source : item;
      try { src.stop(); } catch (e) {}
    });
    loopingSources = [];
    applauseRunning = false;
  }

  // 박수: 공격부 스킵 + 긴 크로스페이드 + 2레이어 위상차로 자연스럽게 이어 붙임
  let applauseRunning = false;

  function playNaturalApplause(opts) {
    const TOTAL_MS = (opts && opts.totalMs) || 18000;
    const FADE_MS = (opts && opts.fadeMs) || 5000;
    const FADE_IN_MS = (opts && opts.fadeInMs) != null ? opts.fadeInMs : 350;
    const VOL = opts && opts.volume != null ? opts.volume : 0.46;
    if (applauseRunning) return;
    stopLoopingAudio();
    applauseRunning = true;

    unlockAudioContext()
      .then(() => loadAudioBuffer("sound/sfx/applause.mp3"))
      .then(buffer => {
        const ctx = getAudioCtx();
        const master = ctx.createGain();
        const t0 = ctx.currentTime;
        // 페이드 인으로 시작
        master.gain.setValueAtTime(0.001, t0);
        master.gain.linearRampToValueAtTime(VOL, t0 + FADE_IN_MS / 1000);
        master.connect(ctx.destination);

        const duration = Math.max(0.8, buffer.duration);
        // 루프 이음새: 앞부분 박수 공격(transient)은 건너뛰고 긴 크로스페이드
        const skipAttack = Math.min(0.28, duration * 0.08);
        const usable = Math.max(0.6, duration - skipAttack);
        const crossfade = Math.min(0.85, usable * 0.28);
        const endAt = t0 + TOTAL_MS / 1000;

        function scheduleLayer(phaseOffset, rate) {
          let nextStart = t0 + 0.02 + phaseOffset;
          let first = true;
          while (nextStart < endAt - 0.08) {
            const source = ctx.createBufferSource();
            const gain = ctx.createGain();
            source.buffer = buffer;
            source.playbackRate.value = rate;
            source.connect(gain);
            gain.connect(master);

            const offset = first ? 0 : skipAttack;
            const playLen = first ? duration : usable;
            const startAt = nextStart;
            const stopAt = startAt + playLen / rate;

            gain.gain.setValueAtTime(0, startAt);
            gain.gain.linearRampToValueAtTime(1, startAt + crossfade);
            const fadeOutStart = Math.max(startAt + crossfade, stopAt - crossfade);
            gain.gain.setValueAtTime(1, fadeOutStart);
            gain.gain.linearRampToValueAtTime(0, stopAt);

            try {
              source.start(startAt, offset, playLen + 0.05);
              source.stop(stopAt + 0.04);
            } catch (e) {}
            loopingSources.push({ source, gain, master });
            nextStart = stopAt - crossfade;
            first = false;
          }
        }

        // 두 레이어를 어긋나게 + 미세한 속도차로 군중감
        scheduleLayer(0, 1.0);
        scheduleLayer(usable * 0.42, 0.985);

        // later()는 finishStory의 clearTimers에 지워질 수 있어 Web Audio로 페이드 예약
        const fadeStart = Math.max(
          t0 + FADE_IN_MS / 1000 + 0.05,
          t0 + (TOTAL_MS - FADE_MS) / 1000
        );
        master.gain.setValueAtTime(VOL, fadeStart);
        master.gain.linearRampToValueAtTime(0.001, fadeStart + FADE_MS / 1000);

        const stopDelay = TOTAL_MS + 400;
        setTimeout(() => {
          stopLoopingAudio();
        }, stopDelay);
      })
      .catch(err => {
        applauseRunning = false;
        console.warn('playNaturalApplause failed:', err);
      });
  }

  function playEndingApplause() {
    playNaturalApplause({ totalMs: 15000, fadeMs: 5000, fadeInMs: 1400, volume: 0.28 });
  }

  preloadAudioBuffers();

  const timeline = [

    {

      ],

    }

  let currentAudio = null;
  let activeAudios = [];
  let stepTimers = [];
  const lipSyncMap = new Map(); // slot -> { timer, resetSrc }

  function clearTimers() {
    stepTimers.forEach(clearTimeout);
    stepTimers = [];
  }

  function later(ms, fn) {
    const id = setTimeout(fn, ms);
    stepTimers.push(id);
  }

  function stopLipSync(slot, resetSrc) {
    if (slot) {
      const state = lipSyncMap.get(slot);
      if (state) {
        clearInterval(state.timer);
        const src = resetSrc !== undefined ? resetSrc : state.resetSrc;
        if (src) {
          const img = slot.querySelector('.character');
          if (img) img.src = src;
        }
        lipSyncMap.delete(slot);
      }
      return;
    }

    // slot 없으면 전부 중지 (리셋은 resetSrc가 true일 때만)
    lipSyncMap.forEach((state, s) => {
      clearInterval(state.timer);
      if (resetSrc && state.resetSrc) {
        const img = s.querySelector('.character');
        if (img) img.src = state.resetSrc;
      }
    });
    lipSyncMap.clear();
  }

  function startLipSync(slot, frames, intervalMs, random, resetSrc) {
    stopLipSync(slot);
    const img = slot && slot.querySelector('.character');
    if (!img || !frames || !frames.length) return;

    let i = 0;
    img.src = frames[0];
    const timer = setInterval(() => {
      if (random && frames.length > 1) {
        let next = Math.floor(Math.random() * frames.length);
        if (next === i) next = (next + 1) % frames.length;
        i = next;
      } else {
        i = (i + 1) % frames.length;
      }
      img.src = frames[i];

    lipSyncMap.set(slot, { timer, resetSrc: resetSrc || frames[0] });

  function playAwardChime() {
    // Ascending을 짧게 페이드아웃해 다음 상장/대사에 끊기지 않게
    unlockAudioContext()
      .then(() => loadAudioBuffer("sound/Ascending 3.mp3"))
      .then(buffer => {
        const ctx = getAudioCtx();
        const source = ctx.createBufferSource();
        const gain = ctx.createGain();
        source.buffer = buffer;
        source.connect(gain);
        gain.connect(ctx.destination);

        const vol = 0.26;
        const now = ctx.currentTime;
        const hold = Math.min(1.15, Math.max(0.7, buffer.duration * 0.45));
        gain.gain.setValueAtTime(0.001, now);
        gain.gain.linearRampToValueAtTime(vol, now + 0.1);
        gain.gain.setValueAtTime(vol, now + hold);
        gain.gain.linearRampToValueAtTime(0.001, now + hold + 0.55);
        source.start(now);
        try { source.stop(now + hold + 0.6); } catch (e) {}
      })
      .catch(err => console.warn('playAwardChime failed:', err));
  }

  function ensureEndingBlinkStack(slot, openSrc, closedSrc) {

  function startKidBlinks(specs) {
    stopEndingBlinks();
    const BLINK_HOLD = 120;

    specs.forEach(s => {
      const pre = new Image();
      pre.src = s.open;
      const pre2 = new Image();
      pre2.src = s.closed;
    });

    const layers = specs.map(s => ensureEndingBlinkStack(s.slot, s.open, s.closed)).filter(Boolean);

    requestAnimationFrame(() => {
      layers.forEach((layer, i) => {
        const { every, startDelay } = specs[i];
        const blinkOnce = () => {
          layer.slot.classList.add('is-blinking');
          const backId = setTimeout(() => {
            layer.slot.classList.remove('is-blinking');
          }, BLINK_HOLD);
          blinkTimeouts.push(backId);
        };
        const startId = setTimeout(() => {
          blinkOnce();
          const intervalId = setInterval(blinkOnce, every);
          blinkIntervals.push(intervalId);
        }, startDelay);
        blinkTimeouts.push(startId);
      });
    });
  }

  function playMissionOverlay(step, onDone) {
    const images = step.missionImages || [];
    const hold = step.missionHoldMs || 1600;
    const sfxSrc = step.missionSfx || "sound/sfx/mission_pop.ogg";

    if (!images.length) {
      onDone();
      return;
    }

    // 먼저 투명 오버레이만 켠 뒤, 미션1과 함께 배경이 어두워지도록
    missionOverlay.classList.remove('dimmed', 'expanding', 'fade-to-ending');
    missionOverlay.classList.add('active');
    missionCard.classList.remove('show', 'expand-fill', 'grow-from-tiny');
    whiteoutEl.classList.remove('active');

    let i = 0;

    const showNext = () => {
      if (i >= images.length) {
        if (step.endingFinale) {
          // 마지막 장(미션6)은 그대로 둔 채 전체 덮기 → 화이트아웃
          expandLastMissionAndRevealEnding(onDone);
        } else {
          missionCard.classList.remove('show');
          later(400, () => {
            missionOverlay.classList.remove('active', 'dimmed');
            missionImage.removeAttribute('src');
            onDone();
          });
        }
        return;
      }

      const src = images[i];
      const isLast = i === images.length - 1;
      const isFirst = i === 0;

      // 미션1~6만 카드 전환, 미션7은 작은 크기에서 확대
      if (!isLast) {
        missionCard.classList.remove('show', 'expand-fill', 'grow-from-tiny');
        missionOverlay.classList.remove('expanding');
      }

      later(isLast ? 80 : (isFirst ? 40 : 180), () => {
        missionImage.src = src;
        const reveal = () => {
          if (isLast && step.endingFinale) {
            // 미션7: 아주 작게 등장 → 화면 전체로 커짐 + Glow
            missionOverlay.classList.add('expanding');
            missionOverlay.classList.remove('dimmed');
            missionCard.classList.remove('expand-fill');
            missionCard.classList.add('grow-from-tiny', 'show');
            startConfetti(true);
            playBuffer("sound/Ascending 3.mp3", null, { volume: 0.7, overlap: true });
            requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                missionCard.classList.remove('grow-from-tiny');
                missionCard.classList.add('expand-fill');
              });
            });
          } else {
            // 미션1: 카드와 함께 화면이 자연스럽게 어두워짐
            if (isFirst) {
              requestAnimationFrame(() => {
                missionOverlay.classList.add('dimmed');
              });
            }
            missionCard.classList.add('show');
            playMissionSfx(sfxSrc);
          }

          i += 1;
          later(isLast && step.endingFinale ? Math.max(hold, 3200) : hold, showNext);
        };

        if (missionImage.complete) {
          reveal();
        } else {
          missionImage.onload = () => {
            missionImage.onload = null;
            reveal();
          };
          missionImage.onerror = () => {
            missionImage.onerror = null;
            reveal();
          };
        }
      });
    };

    images.forEach(src => { const img = new Image(); img.src = src; });
    Object.values(KID_CHANGED).forEach(src => { const img = new Image(); img.src = src; });
    Object.values(KID_CHANGED_BLINK).forEach(src => { const img = new Image(); img.src = src; });
    Object.values(KID_SURPRISED).forEach(src => { const img = new Image(); img.src = src; });
    Object.values(KID_SURPRISED_BLINK).forEach(src => { const img = new Image(); img.src = src; });
    const lightBg = new Image();
    lightBg.src = BG_LIGHT;

    later(200, showNext);
  }

  function playDialogueList(srcs, onDone) {
    if (!srcs || !srcs.length) {
      onDone();
      return;
    }

    unlockAudioContext().then(() => {
      return Promise.all(srcs.map(src => loadAudioBuffer(src).catch(err => {
        console.warn('Group audio decode failed:', src, err);
        return null;
      }))).then(buffers => {
        const valid = buffers.filter(Boolean);
        if (!valid.length) {
          onDone();
          return;
        }

        const ctx = getAudioCtx();
        stopBufferSources(activeBufferSources);
        activeBufferSources = [];

        const startAt = ctx.currentTime + 0.03;
        let ended = 0;
        let finished = false;
        const maxDur = Math.max(...valid.map(b => b.duration || 0));

        const finish = () => {
          if (finished) return;
          finished = true;
          activeBufferSources = [];
          onDone();
        };

        valid.forEach(buffer => {
          const source = ctx.createBufferSource();
          source.buffer = buffer;
          source.connect(ctx.destination);
          source.onended = () => {
            ended += 1;
            if (ended >= valid.length) finish();
          };
          source.start(startAt);
          activeBufferSources.push(source);
        });

        setTimeout(finish, Math.ceil(maxDur * 1000) + 400);
      });
    }).catch(err => {
      console.warn('playDialogueList failed:', err);
      onDone();
    });
  }

  // 히어로 등장 별가루 — 앞에 덮고, 뒤에서 줌아웃

      const x = 50 + Math.cos(u) * r * 34;
      const y = 50 + Math.sin(u) * r * 46;
      s.className = 'sparkle' + (i % 3 === 0 ? ' dot' : '');
      s.style.setProperty('--x', x.toFixed(1) + '%');
      s.style.setProperty('--y', y.toFixed(1) + '%');
      s.style.setProperty('--delay', ((staggerMs || 0) / 1000 + Math.random() * 0.7).toFixed(2) + 's');
      s.style.setProperty('--size', (4 + Math.random() * 11).toFixed(1) + 'px');
      burst.appendChild(s);
    }
    slot.appendChild(burst);
    return burst;
  }

  function setKidsSurprised() {
    // 놀란 표정으로 바꾼 뒤 눈 깜빡임 시작
    startSurprisedBlinks();
  }

  function appearHeroesWithSparkles(heroList) {
    // 히어로 등장 후 약 1초 뒤 유아 → 놀란 표정(+깜빡임)
    later(1000, () => setKidsSurprised());

    // 1) 반짝임이 캐릭터 자리를 먼저 덮음
    const bursts = heroList.map((hero, idx) => {
      hero.classList.add('visible', 'pre-appear');
      return spawnSparkles(hero, idx * 70);
    });

    // 2) 반짝임 뒤에서 커지며 등장 → 반짝임이 서서히 걷힘
    later(900, () => {
      heroList.forEach((hero, idx) => {
        later(idx * 110, () => {
          hero.classList.remove('pre-appear');
          hero.classList.add('appearing');

          const burst = bursts[idx];
          later(450, () => {
            if (burst) burst.classList.add('fading');
          });
          later(1300, () => {
            hero.classList.remove('appearing');
            if (burst && burst.parentNode) burst.parentNode.removeChild(burst);
          });
        });
      });
    });
  }

  // 점프하며 나오기 → 오디오(+입모양) → 앞에 그대로 유지
  function playHeroWalk(hero, audioSrc, onDone, lipOpts) {
    clearSpeaking();
    heroes.forEach(h => h.classList.remove('walking'));

    hero.classList.add('walking');
    later(160, () => {
      hero.classList.add('step-forward');
    });
    later(520, () => {
      hero.classList.remove('walking');

      if (lipOpts && lipOpts.frames) {
        startLipSync(
          hero,
          lipOpts.frames,
          lipOpts.interval || 360,
          !!lipOpts.random,
          lipOpts.reset || lipOpts.frames[0]
        );
      }

      playSingleAudio(audioSrc, () => {
        if (lipOpts && lipOpts.frames) {
          stopLipSync(hero, lipOpts.reset || lipOpts.frames[0]);
        }
        onDone();
      });
    });
  }

  let currentBg = BG_DARK;

  function playStep(index) {
    if (index >= timeline.length) {
      finishStory();
      return;
    }

    const step = timeline[index];
    clearTimers();
    stopAllAudio();
    clearSpeaking();

    // 같은 배경을 다시 넣으면 깜빡일 수 있어, 변경 시에만 적용
    if (step.bg && step.bg !== currentBg) {
      currentBg = step.bg;
      stage.style.backgroundImage = `url('${step.bg}')`;
    }

    if (step.flash) {
      flash.classList.add('flash-active');
      later(800, () => flash.classList.remove('flash-active'));
    }

    if (step.hide) {
      step.hide.forEach(el => {
        el.classList.remove('visible', 'speaking', 'step-forward', 'walking');
      });
    }

    if (step.show) {
      step.show.forEach(el => el.classList.add('visible'));
    }

    // 히어로는 별가루와 함께 등장 (show에 미리 넣지 않음)
    if (step.appearHeroes) {
      appearHeroesWithSparkles(step.appearHeroes);
    }

    const goNext = () => {
      clearSpeaking();
      const wait = step.waitReturn ?? 0;
      if (wait > 0) {
        later(wait, () => playStep(index + 1));
      } else {
        playStep(index + 1);
      }
    };

    // 그룹 대사: (선택)효과음 → 입모양 + 오디오 동시 재생
    if (step.audioList) {
      const startGroupLips = () => {
        if (step.lipSyncGroup) {
          step.lipSyncGroup.forEach(g => {
            startLipSync(
              g.slot,
              g.frames,
              step.lipInterval || 360,
              !!step.lipRandom,
              g.reset || g.frames[0]
            );
          });
        }
      };

      const finishGroupLips = () => {
        if (step.lipSyncGroup) {
          step.lipSyncGroup.forEach(g => {
            stopLipSync(g.slot, g.reset || g.frames[0]);
          });
        }
      };

      const playGroupAudio = () => {
        startGroupLips();
        playDialogueList(step.audioList, () => {
          finishGroupLips();
          goNext();
        });
      };

      if (step.sfx) {
        playBuffer(step.sfx, playGroupAudio, { volume: 0.85, overlap: false });
      } else {
        playGroupAudio();
      }
      return;
    }

    // 히어로 개별: 걸어 나오기 → 오디오 → 뒤로
    if (step.walkHero) {
      playHeroWalk(step.walkHero, step.audio, goNext, step.lipFrames ? {
        frames: step.lipFrames,
        interval: step.lipInterval,
        random: step.lipRandom,
        reset: step.lipReset
      } : null);
      return;
    }

    // 미션활동 오버레이 (배경·캐릭터 유지)
    if (step.missionOverlay) {
      playMissionOverlay(step, goNext);
      return;
    }

    const hold = step.holdBeforeMove ?? 0;
    const moveWait = step.moveBeforeAudio ?? 0;

    // 유아: 제자리 대기 → 대사 (+ 입모양, 몸 흔들림만)
    later(hold, () => {
      setSpeaking(step);
      later(moveWait, () => {
        if (step.lipFrames) {
          startLipSync(
            step.active,
            step.lipFrames,
            step.lipInterval || 360,
            !!step.lipRandom,
            step.lipReset || step.lipFrames[0]
          );
        }
        playSingleAudio(step.audio, () => {
          if (step.lipFrames) {
            stopLipSync(step.active, step.lipReset || step.lipFrames[0]);
          }
          goNext();
        });
      });
    });
  }

  // 시작 버튼: 터치로 오디오 잠금 해제 후 스토리 시작
  const startGate = document.getElementById('start-gate');
  const startBtn = document.getElementById('start-btn');
  const replayBtn = document.getElementById('replay-btn');

  function unlockAudioThenStart() {
    if (startGate) {
      startGate.classList.add('hidden');
      startGate.setAttribute('aria-hidden', 'true');
    }
    // 시작 터치에서 AudioContext를 깨워야 이후 대사가 연속 재생됨
    unlockAudioContext()
      .then(() => {
        const ctx = getAudioCtx();
        const buffer = ctx.createBuffer(1, 1, 22050);
        const source = ctx.createBufferSource();
        source.buffer = buffer;
        source.connect(ctx.destination);
        source.start(0);
        preloadAudioBuffers(); // 백그라운드 프리로드
        playStep(0);
      })
      .catch(() => playStep(0));
  }

  function onReplayClick(e) {
    e.preventDefault();
    e.stopPropagation();
    if (replayBtn.dataset.busy === '1') return;
    replayBtn.dataset.busy = '1';
    resetStoryForReplay();
    unlockAudioContext()
      .then(() => playStep(0))
      .catch(() => playStep(0))
      .finally(() => {
        setTimeout(() => { replayBtn.dataset.busy = '0'; }, 800);
      });
  }

  if (startBtn) {
    const onStart = (e) => {
      e.preventDefault();
      e.stopPropagation();
      startBtn.removeEventListener('pointerdown', onStart);
      startBtn.removeEventListener('touchstart', onStart);
      startBtn.removeEventListener('click', onStart);
      unlockAudioThenStart();
    };
    startBtn.addEventListener('pointerdown', onStart, { once: true });
    startBtn.addEventListener('touchstart', onStart, { once: true, passive: false });
    startBtn.addEventListener('click', onStart, { once: true });
  } else if (startGate) {
    startGate.addEventListener('click', unlockAudioThenStart, { once: true });
  } else {
    playStep(0);
  }

  if (replayBtn) {
    replayBtn.addEventListener('pointerup', onReplayClick);
  }
</script>
</body>
