<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UDL 영양교육 인트로 스토리</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #F3F6F4;
      font-family: 'Pretendard', sans-serif;
    }

    #story-stage {
      position: relative;
      width: 100vw;
      height: 56.25vw;
      max-height: 100vh;
      max-width: 177.78vh;
      margin: auto;
      top: 50%;
      transform: translateY(-50%);
      background-color: #F3F6F4;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      /* 배경 이미지는 원본 그대로 (채도·명암 보정/크로스페이드 없음) */
      overflow: hidden;
      container-type: size;
      container-name: stage;
    }

    .flash-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 99;
    }
    .flash-active {
      animation: flash-anim 0.8s ease-out;
    }
    @keyframes flash-anim {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* 캐릭터 슬롯 (그림자 + 이미지) */
    .char-slot {
      position: absolute;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition:
        transform 1.2s ease,
        opacity 0.7s ease,
        bottom 1.2s ease,
        width 1s ease,
        height 1s ease;
      z-index: 5;
      transform-origin: bottom center;
    }
    .char-slot.visible {
      opacity: 1;
    }

    /* 나란히 서 있는 기본(뒤) 위치 */
    .char-slot.child {
      bottom: 10%;
      width: 16%;
      height: 42%;
      z-index: 5;
    }

    /* 뚱뚱유아·장난감유아: 동일 높이 */
    #slot-child-fat,
    #slot-child-toy {
      height: 42%;
      width: 16%;
      overflow: visible;
    }
    #slot-child-fat .character,
    #slot-child-toy .character {
      height: 100%;
      width: auto;
      max-width: none;
      object-fit: contain;
      object-position: bottom center;
      transform-origin: bottom center;
    }
    /* 장난감유아·1·2: 살짝 크게 (놀란 이미지도 동일 슬롯) */
    #slot-child-toy .character {
      height: 106%;
    }
    #slot-child-sick .character {
      height: 100%;
      width: auto;
      max-width: none;
      object-fit: contain;
      object-position: bottom center;
    }

    /* 대사 중: 앞으로 살짝 */
    .char-slot.speaking {
      transform: translateY(3%) scale(1.04);
      bottom: 7.5%;
      z-index: 20;
    }

    /* 뚱뚱유아·장난감유아 말할 때: 발 고정, 몸만 부드럽게 살짝 흔들림 */
    #slot-child-fat.speaking .character,
    #slot-child-toy.speaking .character {
      transform-origin: bottom center;
      animation: talk-sway 1.45s ease-in-out infinite;
    }
    @keyframes talk-sway {
      0%, 100% {
        transform: rotate(0deg) translateY(0);
      }
      35% {
        transform: rotate(-1.1deg) translateY(-1.2%);
      }
      70% {
        transform: rotate(0.9deg) translateY(-0.4%);
      }
    }

    .foot-shadow {
      position: absolute;
      bottom: 1%;
      left: 28%;
      width: 58%;
      height: 10%;
      background: radial-gradient(
        ellipse at center,
        rgba(0, 0, 0, 0.42) 0%,
        rgba(0, 0, 0, 0.18) 45%,
        transparent 72%
      );
      transform: translateX(-18%) skewX(-28deg);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    /* 배아픈유아 그림자 조금 더 크게 */
    #slot-child-sick .foot-shadow {
      width: 78%;
      height: 15%;
      bottom: 0;
      left: 22%;
      opacity: 0.95;
    }

    .character {
      position: relative;
      z-index: 1;
      height: 100%;
      width: 100%;
      object-fit: contain;
      object-position: bottom center;
      display: block;
    }

    /* 유아 나란히 (사이 공간에 히어로 등장) */
    #slot-child-fat  { left: 4%; }
    #slot-child-toy  { left: 36%; }
    #slot-child-sick { left: 68%; }

    /* 히어로: 유아와 같은 라인에 등장, 사이사이 배치 */
    .char-slot.hero {
      bottom: 10%;
      width: 15%;
      height: 44%;
      z-index: 12;
      transition:
        transform 0.28s cubic-bezier(0.2, 0.9, 0.3, 1),
        opacity 0.7s ease,
        bottom 0.28s cubic-bezier(0.2, 0.9, 0.3, 1);
    }
    #slot-hero-healthy { left: 20%; }
    #slot-hero-eti     { left: 53%; width: 13%; height: 39%; }
    #slot-hero-safey   { left: 82%; width: 17%; height: 48%; }

    /* 점프하며 살짝만 나오기 (미끄러짐 최소화) */
    .char-slot.hero.step-forward {
      bottom: 8.5%;
      transform: translateY(2%) scale(1.03);
      z-index: 22;
    }

    /* 한 번 점프하며 나오기/들어가기 */
    .char-slot.hero.walking .character {
      transform-origin: bottom center;
      animation: walk-bounce 0.65s ease-in-out 1;
    }
    @keyframes walk-bounce {
      0% { transform: translateY(0) scale(1, 1); }
      35% { transform: translateY(-16%) scale(0.96, 1.09); }
      70% { transform: translateY(0) scale(1.05, 0.93); }
      100% { transform: translateY(0) scale(1, 1); }
    }

    /* 히어로 등장 별가루 — 캐릭터 앞에 덮어 두고, 뒤에서 줌아웃 */
    .sparkle-burst {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 20;
      overflow: visible;
      transition: opacity 0.85s ease-out;
    }
    .sparkle-burst.fading {
      opacity: 0;
    }
    .sparkle-silhouette {
      position: absolute;
      left: 10%;
      top: 2%;
      width: 80%;
      height: 94%;
      border-radius: 48% 48% 42% 42%;
      background: radial-gradient(
        ellipse at 50% 42%,
        rgba(255, 245, 170, 0.7) 0%,
        rgba(255, 215, 100, 0.38) 36%,
        rgba(255, 190, 70, 0.12) 58%,
        transparent 76%
      );
      filter: blur(2.5px);
      animation: silhouette-pulse 1.1s ease-in-out infinite;
    }
    @keyframes silhouette-pulse {
      0%, 100% { opacity: 0.65; transform: scale(0.97); }
      50% { opacity: 1; transform: scale(1.05); }
    }
    .sparkle {
      position: absolute;
      left: var(--x, 50%);
      top: var(--y, 50%);
      width: var(--size, 7px);
      height: var(--size, 7px);
      margin-left: calc(var(--size, 7px) / -2);
      margin-top: calc(var(--size, 7px) / -2);
      background: #FFE566;
      box-shadow:
        0 0 4px rgba(255, 255, 255, 0.95),
        0 0 10px rgba(255, 209, 92, 0.9),
        0 0 16px rgba(255, 180, 60, 0.55);
      clip-path: polygon(
        50% 0%, 63% 38%, 100% 38%, 69% 59%,
        82% 100%, 50% 75%, 18% 100%, 31% 59%,
        0% 38%, 37% 38%
      );
      opacity: 0;
      animation: sparkle-twinkle 0.95s ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }
    .sparkle.dot {
      clip-path: none;
      border-radius: 50%;
      background: #FFF8D6;
    }
    @keyframes sparkle-twinkle {
      0%, 100% {
        opacity: 0.15;
        transform: scale(0.45) rotate(0deg);
      }
      45% {
        opacity: 1;
        transform: scale(1.3) rotate(25deg);
      }
      70% {
        opacity: 0.6;
        transform: scale(0.85) rotate(10deg);
      }
    }

    .char-slot.hero .character {
      z-index: 2;
    }
    .char-slot.hero .foot-shadow {
      z-index: 1;
    }

    /* 별가루만 먼저: 캐릭터·그림자 숨김 */
    .char-slot.hero.pre-appear .character,
    .char-slot.hero.pre-appear .foot-shadow {
      opacity: 0;
    }

    /* 제자리에서 커지며 등장 */
    .char-slot.hero.appearing .character {
      animation: hero-grow-in 1.05s cubic-bezier(0.22, 0.61, 0.36, 1) both;
      transform-origin: bottom center;
    }
    .char-slot.hero.appearing .foot-shadow {
      animation: hero-shadow-in 1.05s ease-out both;
    }
    @keyframes hero-grow-in {
      0% {
        opacity: 0;
        filter: brightness(1.7);
        transform: scale(0.35);
      }
      55% {
        opacity: 1;
        filter: brightness(1.25);
        transform: scale(1.06);
      }
      100% {
        opacity: 1;
        filter: brightness(1);
        transform: scale(1);
      }
    }
    @keyframes hero-shadow-in {
      0% { opacity: 0; transform: translateX(-18%) skewX(-28deg) scale(0.35); }
      55% { opacity: 1; transform: translateX(-18%) skewX(-28deg) scale(1.05); }
      100% { opacity: 1; transform: translateX(-18%) skewX(-28deg) scale(1); }
    }

    /* 미션 활동 오버레이 */
    #mission-overlay {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.28);
      pointer-events: none;
    }
    #mission-overlay.active {
      display: flex;
    }
    #mission-card {
      width: 94%;
      max-width: none;
      max-height: 94%;
      border-radius: 14px;
      overflow: hidden;
      box-shadow:
        0 12px 40px rgba(0, 0, 0, 0.45),
        0 0 0 4px rgba(255, 255, 255, 0.55);
      opacity: 0;
      transform: scale(0.92) translateY(12px);
      transition: opacity 0.45s ease, transform 0.45s ease;
      background: #fff;
    }
    #mission-card.show {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
    #mission-card img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 92cqh;
      object-fit: contain;
      background: #fff;
    }

    /* 미션7: 아주 작은 크기 → 화면 전체 */
    #mission-overlay.expanding {
      background: rgba(0, 0, 0, 0);
      transition: background 0.6s ease;
    }
    #mission-card.grow-from-tiny {
      width: 6%;
      max-width: none;
      height: 6%;
      max-height: none;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      opacity: 1;
      transform: none;
      transition: none;
    }
    #mission-card.expand-fill {
      width: 100%;
      max-width: none;
      height: 100%;
      max-height: none;
      border-radius: 0;
      box-shadow: none;
      transform: none;
      opacity: 1;
      transition:
        width 1.25s cubic-bezier(0.22, 0.61, 0.36, 1),
        height 1.25s cubic-bezier(0.22, 0.61, 0.36, 1),
        border-radius 1.25s ease;
    }
    #mission-card.expand-fill img,
    #mission-card.grow-from-tiny img {
      width: 100%;
      height: 100%;
      max-height: none;
      object-fit: cover;
    }
    #mission-card.expand-fill img {
      transition: filter 1.4s ease, opacity 1.4s ease;
    }
    #whiteout {
      position: absolute;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      background: #ffffff;
      transition: opacity 1.65s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #whiteout.active {
      opacity: 1;
    }
    #whiteout.reveal {
      opacity: 0;
      transition: opacity 1.8s cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    /* 화이트아웃 위 빛 번짐 (순백) */
    #whiteout::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 40%;
      width: 140%;
      height: 140%;
      transform: translate(-50%, -50%) scale(0.4);
      background: radial-gradient(circle, #ffffff 0%, rgba(255, 255, 255, 0.7) 40%, transparent 70%);
      opacity: 0;
      transition: transform 1.7s ease, opacity 1.2s ease;
    }
    #whiteout.active::after {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.15);
    }

    /* 알록달록 종이 가루 */
    #confetti {
      position: absolute;
      inset: 0;
      z-index: 80;
      pointer-events: none;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      top: -8%;
      left: 50%;
      width: 16px;
      height: 20px;
      background: #FF6B6B;
      opacity: 1;
      border-radius: 2px;
      animation-name: confetti-fall;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
    }
    .confetti-piece.round {
      border-radius: 50%;
    }
    @keyframes confetti-fall {
      0% {
        transform: translate3d(0, 0, 0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translate3d(var(--drift, 30px), var(--fall, 900px), 0) rotate(var(--spin, 720deg));
        opacity: 0.85;
      }
    }

    /* 엔딩 바운스 (배아픈유아 변화 제외) */
    .char-slot.ending-bounce .character {
      transform-origin: bottom center;
      animation: ending-bounce 1.15s ease-in-out infinite;
    }
    #slot-child-fat.ending-bounce .character { animation-delay: 0s; }
    #slot-child-toy.ending-bounce .character { animation-delay: 0.12s; }
    #slot-hero-healthy.ending-bounce .character { animation-delay: 0.05s; }
    #slot-hero-eti.ending-bounce .character { animation-delay: 0.18s; }
    #slot-hero-safey.ending-bounce .character { animation-delay: 0.08s; }
    @keyframes ending-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* 시작 버튼 (오디오 잠금 해제용) */
    #start-gate {
      position: absolute;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(20, 28, 24, 0.42);
      -webkit-tap-highlight-color: transparent;
    }
    #start-gate.hidden {
      display: none;
    }
    #start-btn {
      appearance: none;
      border: 3px solid #fff;
      cursor: pointer;
      color: #2d5a3d;
      font-size: clamp(18px, 3.6vmin, 28px);
      font-weight: 800;
      letter-spacing: 0.08em;
      padding: 0.55em 1.4em 0.6em;
      border-radius: 999px;
      background: linear-gradient(165deg, #E8F9C8 0%, #B8E986 45%, #8FD460 100%);
      box-shadow:
        0 0 0 3px rgba(100, 170, 70, 0.35),
        0 6px 0 #5FA83A,
        0 10px 22px rgba(40, 90, 30, 0.25);
      transform-origin: center bottom;
      animation: start-btn-bounce 1.4s ease-in-out infinite;
    }
    #start-btn::before {
      content: '▶ ';
      font-size: 0.78em;
      vertical-align: 0.05em;
    }
    #start-btn:active {
      animation: none;
      transform: translateY(4px);
      box-shadow:
        0 0 0 3px rgba(100, 170, 70, 0.3),
        0 2px 0 #5FA83A,
        0 4px 12px rgba(40, 90, 30, 0.2);
    }
    @keyframes start-btn-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }
  </style>
</head>
<body>

<div id="story-stage" style="background-image: url('image/어두운교실.png');">
  <div class="flash-overlay" id="flash"></div>

  <div class="char-slot child visible" id="slot-child-fat">
    <div class="foot-shadow"></div>
    <img class="character" src="image/뚱뚱유아.png?v=4" alt="뚱뚱유아">
  </div>
  <div class="char-slot child visible" id="slot-child-toy">
    <div class="foot-shadow"></div>
    <img class="character" src="image/장난감유아.png?v=4" alt="장난감유아">
  </div>
  <div class="char-slot child visible" id="slot-child-sick">
    <div class="foot-shadow"></div>
    <img class="character" src="image/배아픈유아.png?v=4" alt="배아픈유아">
  </div>

  <div class="char-slot hero" id="slot-hero-healthy">
    <div class="foot-shadow"></div>
    <img class="character" src="image/헬씨.png?v=4" alt="헬씨">
  </div>
  <div class="char-slot hero" id="slot-hero-eti">
    <div class="foot-shadow"></div>
    <img class="character" src="image/에티.png?v=4" alt="에티">
  </div>
  <div class="char-slot hero" id="slot-hero-safey">
    <div class="foot-shadow"></div>
    <img class="character" src="image/세이피.png?v=4" alt="세이피">
  </div>

  <div id="mission-overlay" aria-hidden="true">
    <div id="mission-card">
      <img id="mission-image" src="" alt="미션 활동">
    </div>
  </div>
  <div id="whiteout" aria-hidden="true"></div>
  <div id="confetti" aria-hidden="true"></div>
  <div id="start-gate" aria-hidden="false">
    <button type="button" id="start-btn" aria-label="시작">시작!</button>
  </div>
</div>

<script>
  const stage = document.getElementById('story-stage');
  const flash = document.getElementById('flash');

  const childFat = document.getElementById('slot-child-fat');
  const childToy = document.getElementById('slot-child-toy');
  const childSick = document.getElementById('slot-child-sick');
  const kids = [childFat, childToy, childSick];

  const heroHealthy = document.getElementById('slot-hero-healthy');
  const heroEti = document.getElementById('slot-hero-eti');
  const heroSafey = document.getElementById('slot-hero-safey');
  const heroes = [heroHealthy, heroEti, heroSafey];

  const allSlots = [...kids, ...heroes];

  const BG_DARK = "image/어두운교실.png";
  const BG_LIGHT = "image/밝은교실.png";
  // 입모양·캐릭터 이미지 캐시 버스팅
  const LIP_CACHE = "?v=4";
  const KID_CHANGED = {
    fat: "image/뚱뚱유아(변화).png" + LIP_CACHE,
    toy: "image/장난감유아(변화).png" + LIP_CACHE,
    sick: "image/배아픈유아(변화).png" + LIP_CACHE
  };
  const KID_SURPRISED = {
    fat: "image/놀란뚱뚱유아.png" + LIP_CACHE,
    toy: "image/놀란장난감유아.png" + LIP_CACHE,
    sick: "image/놀란배아픈유아.png" + LIP_CACHE
  };
  const FAT_LIP_FRAMES = [
    "image/뚱뚱유아1.png" + LIP_CACHE,
    "image/뚱뚱유아2.png" + LIP_CACHE,
    "image/뚱뚱유아3.png" + LIP_CACHE
  ];
  const TOY_LIP_FRAMES = [
    "image/장난감유아2.png" + LIP_CACHE,
    "image/장난감유아3.png" + LIP_CACHE
  ];
  const SICK_LIP_FRAMES = [
    "image/배아픈유아1.png" + LIP_CACHE,
    "image/배아픈유아2.png" + LIP_CACHE
  ];
  const HEALTHY_LIP_FRAMES = [
    "image/헬씨1.png" + LIP_CACHE,
    "image/헬씨2.png" + LIP_CACHE
  ];
  const ETI_LIP_FRAMES = [
    "image/에티1.png" + LIP_CACHE,
    "image/에티2.png" + LIP_CACHE
  ];
  const SAFEY_LIP_FRAMES = [
    "image/세이피1.png" + LIP_CACHE,
    "image/세이피2.png" + LIP_CACHE
  ];
  const HERO_LIP_GROUP = [
    {
      slot: heroHealthy,
      frames: HEALTHY_LIP_FRAMES,
      reset: "image/헬씨.png" + LIP_CACHE
    },
    {
      slot: heroEti,
      frames: ETI_LIP_FRAMES,
      reset: "image/에티.png" + LIP_CACHE
    },
    {
      slot: heroSafey,
      frames: SAFEY_LIP_FRAMES,
      reset: "image/세이피.png" + LIP_CACHE
    }
  ];
  [
    ...FAT_LIP_FRAMES,
    ...TOY_LIP_FRAMES,
    ...SICK_LIP_FRAMES,
    ...HEALTHY_LIP_FRAMES,
    ...ETI_LIP_FRAMES,
    ...SAFEY_LIP_FRAMES
  ].forEach(src => {
    const img = new Image();
    img.src = src;
  });

  // 앱인벤터/태블릿: HTML Audio는 첫 터치 이후 재생이 막히므로 Web Audio로 통일
  const ALL_STORY_AUDIO = [
    "sound/audio_뚱뚱유아_대사1.mp3",
    "sound/audio_장난감유아_대사1.mp3",
    "sound/audio_배아픈유아_대사1.mp3",

  let audioCtx = null;
  const audioBufferCache = new Map();
  let activeBufferSources = [];
  let loopingSources = [];

  function getAudioCtx() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
    }
    return audioCtx;
  }

  function unlockAudioContext() {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') {
      return ctx.resume().catch(() => {});
    }
    return Promise.resolve();
  }

  function preloadAudioBuffers(list) {
    const srcs = list || ALL_STORY_AUDIO;
    return Promise.all(srcs.map(src =>
      loadAudioBuffer(src).catch(err => {
        console.warn('Audio buffer preload failed:', src, err);
        return null;
      })
    ));
  }

  function loadAudioBuffer(src) {
    if (audioBufferCache.has(src)) {
      return Promise.resolve(audioBufferCache.get(src));
    }
    const ctx = getAudioCtx();
    return fetch(encodeURI(src))
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.arrayBuffer();
      })
      .then(buf => ctx.decodeAudioData(buf.slice(0)))
      .then(decoded => {
        audioBufferCache.set(src, decoded);
        return decoded;
      });
  }

  function stopBufferSources(list) {
    (list || []).forEach(src => {
      try { src.stop(); } catch (e) {}
    });
  }

  /** Web Audio 단건 재생 (태블릿에서도 연속 재생 가능) */
  function playBuffer(src, onDone, opts) {
    const volume = opts && opts.volume != null ? opts.volume : 1;
    const loop = !!(opts && opts.loop);
    return unlockAudioContext()
      .then(() => loadAudioBuffer(src))
      .then(buffer => {
        const ctx = getAudioCtx();
        if (!(opts && opts.overlap)) {
          stopBufferSources(activeBufferSources);
          activeBufferSources = [];
        }
        const source = ctx.createBufferSource();
        const gain = ctx.createGain();
        gain.gain.value = volume;
        source.buffer = buffer;
        source.loop = loop;
        source.connect(gain);
        gain.connect(ctx.destination);

        let finished = false;
        const done = () => {
          if (finished) return;
          finished = true;
          if (typeof onDone === 'function') onDone();
        };

        source.onended = () => {
          if (!loop) done();
        };
        source.start();
        if (loop) {
          loopingSources.push(source);
        } else {
          activeBufferSources.push(source);
          setTimeout(done, Math.ceil((buffer.duration || 1) * 1000) + 250);
        }
        return source;
      })
      .catch(err => {
        console.warn('playBuffer failed:', src, err);
        if (typeof onDone === 'function') {
          setTimeout(onDone, 1200);
        }
        return null;
      });
  }

  function clearTimers() {

  function later(ms, fn) {

  function stopLipSync(slot, resetSrc) {
    if (slot) {
      const state = lipSyncMap.get(slot);
      if (state) {
        clearInterval(state.timer);
        const src = resetSrc !== undefined ? resetSrc : state.resetSrc;
        if (src) {
          const img = slot.querySelector('.character');
          if (img) img.src = src;
        }
        lipSyncMap.delete(slot);
      }
      return;
    }

    // slot 없으면 전부 중지 (리셋은 resetSrc가 true일 때만)
    lipSyncMap.forEach((state, s) => {
      clearInterval(state.timer);
      if (resetSrc && state.resetSrc) {
        const img = s.querySelector('.character');
        if (img) img.src = state.resetSrc;
      }
    });
    lipSyncMap.clear();
  }

  function startLipSync(slot, frames, intervalMs, random, resetSrc) {
    stopLipSync(slot);
    const img = slot && slot.querySelector('.character');
    if (!img || !frames || !frames.length) return;

    let i = 0;
    img.src = frames[0];
    const timer = setInterval(() => {
      if (random && frames.length > 1) {
        let next = Math.floor(Math.random() * frames.length);
        if (next === i) next = (next + 1) % frames.length;
        i = next;
      } else {
        i = (i + 1) % frames.length;
      }
      img.src = frames[i];
    }, intervalMs || 360);

    lipSyncMap.set(slot, { timer, resetSrc: resetSrc || frames[0] });
  }

  function spawnConfettiPiece() {
    if (!confettiEl) return;
    const stageH = Math.max((stage && stage.clientHeight) || 0, window.innerHeight * 0.5, 400);
    const stageW = Math.max((stage && stage.clientWidth) || 0, window.innerWidth * 0.5, 600);
    const colors = ['#FF6B6B', '#FFD15C', '#7CFFB2', '#7AB8FF', '#FF9AD5', '#B388FF', '#FF8A5B', '#FFF3A0'];
    const p = document.createElement('span');
    const kind = Math.random();
    const w = 10 + Math.random() * 16;
    const h = kind < 0.5 ? (8 + Math.random() * 12) : (16 + Math.random() * 18);
    p.className = 'confetti-piece' + (kind < 0.4 ? ' round' : '');
    p.style.left = (Math.random() * 100).toFixed(1) + '%';
    p.style.top = (-8 - Math.random() * 12).toFixed(1) + '%';
    p.style.width = w.toFixed(0) + 'px';
    p.style.height = h.toFixed(0) + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.setProperty('--drift', ((Math.random() - 0.5) * stageW * 0.35).toFixed(0) + 'px');
    p.style.setProperty('--fall', (stageH * (1.15 + Math.random() * 0.25)).toFixed(0) + 'px');
    p.style.setProperty('--spin', ((Math.random() > 0.5 ? 1 : -1) * (480 + Math.random() * 600)).toFixed(0) + 'deg');
    p.style.animationDuration = (3 + Math.random() * 2.5).toFixed(2) + 's';
    p.style.animationDelay = (Math.random() * 0.2).toFixed(2) + 's';
    confettiEl.appendChild(p);
    setTimeout(() => {
      if (p.parentNode) p.parentNode.removeChild(p);
    }, 8000);
  }

  function startConfetti(force) {
    if (confettiTimer && !force) return;
    if (confettiTimer) {
      clearInterval(confettiTimer);
      confettiTimer = null;
    }
    if (!confettiEl) return;
    confettiEl.innerHTML = '';
    confettiEl.setAttribute('aria-hidden', 'false');
    confettiEl.style.display = 'block';
    confettiEl.style.zIndex = '80';
    for (let i = 0; i < 28; i++) spawnConfettiPiece();
    confettiTimer = setInterval(() => {
      spawnConfettiPiece();
      spawnConfettiPiece();
      if (Math.random() > 0.25) spawnConfettiPiece();
    }, 220);
  }

  function ensureConfetti() {

  function expandLastMissionAndRevealEnding(onDone) {
    // 미션7이 이미 전체화면 — 잠시 유지 후 화이트아웃

  function playMissionOverlay(step, onDone) {
    const images = step.missionImages || [];
    const hold = step.missionHoldMs || 1600;
    const sfxSrc = step.missionSfx || "sound/sfx/mission_pop.ogg";

    if (!images.length) {
      onDone();
      return;
    }

    missionOverlay.classList.add('active');
    missionCard.classList.remove('show', 'expand-fill');
    missionOverlay.classList.remove('expanding');
    whiteoutEl.classList.remove('active');

    let i = 0;

    const showNext = () => {
      if (i >= images.length) {
        if (step.endingFinale) {
          // 마지막 장(미션6)은 그대로 둔 채 전체 덮기 → 화이트아웃
          expandLastMissionAndRevealEnding(onDone);
        } else {
          missionCard.classList.remove('show');
          later(400, () => {
            missionOverlay.classList.remove('active');
            missionImage.removeAttribute('src');
            onDone();
          });
        }
        return;
      }

      const src = images[i];
      const isLast = i === images.length - 1;

      // 미션1~6만 카드 전환, 미션7은 작은 크기에서 확대
      if (!isLast) {
        missionCard.classList.remove('show', 'expand-fill', 'grow-from-tiny');
        missionOverlay.classList.remove('expanding');

      later(isLast ? 80 : 180, () => {
        missionImage.src = src;

            missionOverlay.classList.add('expanding');

                missionCard.classList.remove('grow-from-tiny');
                missionCard.classList.add('expand-fill');

            playMissionSfx(sfxSrc);
          }

          i += 1;
          later(isLast && step.endingFinale ? Math.max(hold, 1500) : hold, showNext);
        };

        if (missionImage.complete) {
          reveal();
        } else {
          missionImage.onload = () => {
            missionImage.onload = null;
            reveal();
          };
          missionImage.onerror = () => {
            missionImage.onerror = null;
            reveal();
          };
        }
      });

  function playDialogueList(srcs, onDone) {
    if (!srcs || !srcs.length) {
      onDone();
      return;
    }

    unlockAudioContext().then(() => {
      return Promise.all(srcs.map(src => loadAudioBuffer(src).catch(err => {
        console.warn('Group audio decode failed:', src, err);
        return null;
      }))).then(buffers => {
        const valid = buffers.filter(Boolean);
        if (!valid.length) {
          onDone();
          return;
        }

        const ctx = getAudioCtx();
        stopBufferSources(activeBufferSources);
        activeBufferSources = [];

        const startAt = ctx.currentTime + 0.03;
        let ended = 0;
        let finished = false;
        const maxDur = Math.max(...valid.map(b => b.duration || 0));

        const finish = () => {
          if (finished) return;
          finished = true;
          activeBufferSources = [];
          onDone();
        };

        valid.forEach(buffer => {
          const source = ctx.createBufferSource();
          source.buffer = buffer;
          source.connect(ctx.destination);
          source.onended = () => {
            ended += 1;
            if (ended >= valid.length) finish();
          };
          source.start(startAt);
          activeBufferSources.push(source);
        });

        setTimeout(finish, Math.ceil(maxDur * 1000) + 400);
      });
    }).catch(err => {
      console.warn('playDialogueList failed:', err);
      onDone();
    });
  }

  // 히어로 등장 별가루 — 앞에 덮고, 뒤에서 줌아웃

    const count = 56;
    for (let i = 0; i < count; i++) {
      const s = document.createElement('span');
      const u = Math.random() * Math.PI * 2;
      const r = Math.sqrt(Math.random());
      const x = 50 + Math.cos(u) * r * 34;
      const y = 50 + Math.sin(u) * r * 46;
      s.className = 'sparkle' + (i % 3 === 0 ? ' dot' : '');
      s.style.setProperty('--x', x.toFixed(1) + '%');
      s.style.setProperty('--y', y.toFixed(1) + '%');
      s.style.setProperty('--delay', ((staggerMs || 0) / 1000 + Math.random() * 0.7).toFixed(2) + 's');
      s.style.setProperty('--size', (4 + Math.random() * 11).toFixed(1) + 'px');
      burst.appendChild(s);

    slot.appendChild(burst);
    return burst;

    later(1000, () => setKidsSurprised());

      return spawnSparkles(hero, idx * 70);
    });

    // 2) 반짝임 뒤에서 커지며 등장 → 반짝임이 서서히 걷힘
    later(900, () => {
      heroList.forEach((hero, idx) => {
        later(idx * 110, () => {
          hero.classList.remove('pre-appear');
          hero.classList.add('appearing');

          const burst = bursts[idx];
          later(450, () => {
            if (burst) burst.classList.add('fading');
          });
          later(1300, () => {
            hero.classList.remove('appearing');
            if (burst && burst.parentNode) burst.parentNode.removeChild(burst);
          });
        });
      });
    });
  }

  // 점프하며 나오기 → 오디오(+입모양) → 점프하며 들어가기
  function playHeroWalk(hero, audioSrc, onDone, lipOpts) {
    clearSpeaking();
    heroes.forEach(h => h.classList.remove('step-forward', 'walking'));

    // 점프 정점에서 위치 이동 → 착지 (미끄러짐 방지)
    hero.classList.add('walking');
    later(220, () => {
      hero.classList.add('step-forward');
    });
    later(700, () => {
      hero.classList.remove('walking');

      if (lipOpts && lipOpts.frames) {
        startLipSync(
          hero,
          lipOpts.frames,
          lipOpts.interval || 360,
          !!lipOpts.random,
          lipOpts.reset || lipOpts.frames[0]
        );
      }

      playSingleAudio(audioSrc, () => {
        if (lipOpts && lipOpts.frames) {
          stopLipSync(hero, lipOpts.reset || lipOpts.frames[0]);
        }
        // 점프 정점에서 제자리로
        hero.classList.add('walking');
        later(220, () => {
          hero.classList.remove('step-forward');
        });
        later(700, () => {
          hero.classList.remove('walking');
          onDone();
        });
      });
    });
  }

  let currentBg = BG_DARK;

  function playStep(index) {
    if (index >= timeline.length) {
      finishStory();
      return;
    }

    const step = timeline[index];
    clearTimers();
    stopAllAudio();
    clearSpeaking();

    // 같은 배경을 다시 넣으면 깜빡일 수 있어, 변경 시에만 적용
    if (step.bg && step.bg !== currentBg) {
      currentBg = step.bg;
      stage.style.backgroundImage = `url('${step.bg}')`;
    }

    if (step.flash) {
      flash.classList.add('flash-active');
      later(800, () => flash.classList.remove('flash-active'));
    }

    if (step.hide) {
      step.hide.forEach(el => {
        el.classList.remove('visible', 'speaking', 'step-forward', 'walking');
      });
    }

    if (step.show) {
      step.show.forEach(el => el.classList.add('visible'));
    }

    // 히어로는 별가루와 함께 등장 (show에 미리 넣지 않음)
    if (step.appearHeroes) {
      appearHeroesWithSparkles(step.appearHeroes);
    }

    const goNext = () => {
      clearSpeaking();
      const wait = step.waitReturn ?? 0;
      if (wait > 0) {
        later(wait, () => playStep(index + 1));
      } else {
        playStep(index + 1);
      }
    };

    // 그룹 대사: (선택)효과음 → 입모양 + 오디오 동시 재생
    if (step.audioList) {
      const startGroupLips = () => {
        if (step.lipSyncGroup) {
          step.lipSyncGroup.forEach(g => {
            startLipSync(
              g.slot,
              g.frames,
              step.lipInterval || 360,
              !!step.lipRandom,
              g.reset || g.frames[0]
            );
          });
        }
      };

      const finishGroupLips = () => {
        if (step.lipSyncGroup) {
          step.lipSyncGroup.forEach(g => {
            stopLipSync(g.slot, g.reset || g.frames[0]);
          });
        }
      };

      const playGroupAudio = () => {
        startGroupLips();
        playDialogueList(step.audioList, () => {
          finishGroupLips();
          goNext();
        });
      };

      if (step.sfx) {
        playBuffer(step.sfx, playGroupAudio, { volume: 0.85, overlap: false });
      } else {
        playGroupAudio();
      }
      return;
    }

    // 히어로 개별: 걸어 나오기 → 오디오 → 뒤로
    if (step.walkHero) {
      playHeroWalk(step.walkHero, step.audio, goNext, step.lipFrames ? {
        frames: step.lipFrames,
        interval: step.lipInterval,
        random: step.lipRandom,
        reset: step.lipReset
      } : null);
      return;
    }

    // 미션활동 오버레이 (배경·캐릭터 유지)
    if (step.missionOverlay) {
      playMissionOverlay(step, goNext);
      return;
    }

    const hold = step.holdBeforeMove ?? 0;
    const moveWait = step.moveBeforeAudio ?? 0;

    // 유아: 나란히 대기 → 앞으로 → 대사 (+ 입모양 전환)
    later(hold, () => {
      setSpeaking(step);
      later(moveWait, () => {
        if (step.lipFrames) {
          startLipSync(
            step.active,
            step.lipFrames,
            step.lipInterval || 360,
            !!step.lipRandom,
            step.lipReset || step.lipFrames[0]
          );
        }
        playSingleAudio(step.audio, () => {
          if (step.lipFrames) {
            stopLipSync(step.active, step.lipReset || step.lipFrames[0]);
          }
          goNext();
        });
      });
    });
  }

  // 시작 버튼: 터치로 오디오 잠금 해제 후 스토리 시작
  const startGate = document.getElementById('start-gate');
  const startBtn = document.getElementById('start-btn');

  function unlockAudioThenStart() {
    if (startGate) {
      startGate.classList.add('hidden');
      startGate.setAttribute('aria-hidden', 'true');
    }
    // 시작 터치에서 AudioContext를 깨워야 이후 대사가 연속 재생됨
    unlockAudioContext()
      .then(() => {
        const ctx = getAudioCtx();
        const buffer = ctx.createBuffer(1, 1, 22050);
        const source = ctx.createBufferSource();
        source.buffer = buffer;
        source.connect(ctx.destination);
        source.start(0);
        preloadAudioBuffers(); // 백그라운드 프리로드
        playStep(0);
      })
      .catch(() => playStep(0));
  }

  if (startBtn) {
    const onStart = (e) => {
      e.preventDefault();
      e.stopPropagation();
      startBtn.removeEventListener('pointerdown', onStart);
      startBtn.removeEventListener('touchstart', onStart);
      startBtn.removeEventListener('click', onStart);
      unlockAudioThenStart();
    };
    startBtn.addEventListener('pointerdown', onStart, { once: true });
    startBtn.addEventListener('touchstart', onStart, { once: true, passive: false });
    startBtn.addEventListener('click', onStart, { once: true });
  } else if (startGate) {
    startGate.addEventListener('click', unlockAudioThenStart, { once: true });
  } else {
    playStep(0);
  }
</script>
</body>
